{% extends 'sidebar.html' %}
{% block content %}
<div style="background-color: black;">
	<div class="container">
		<div class="row">
			<br><br>
			<center><h1 style="color:skyblue;"><i><u>ALL movies</i></u></h1></center>
{% for i in data %}
             <div class="col-4">
             	<div class="card mt-5" style="width:18rem;">
             		<img src="{{i.Photo.url}}" class="card-img-top" alt="" height="250px">
             		<div class="card-body" style="background-color: black; color: white;">
             			<h5 class="card-title"></h5>
             			<h3 class="card-text"><b><center>{{i.movie_name|title}}</center></b></h3>
             			<br>
             			<a href="{% url 'moviedetail' id=i.id %}" class="btn btn-info text-black form-center" style="background-color:#D96C2C text-decoration:blink;"><center>Book ticket</center></a>
             		</div></div></div>
{% endfor %}
   




         </div></div>
     </div>
  {% endblock %}
